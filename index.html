<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Custody Calendar — Wilkinson v. Wilkinson</title>

<!-- PWA Meta Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2AB5B3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Custody Cal">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
:root {
  --chris: #2AB5B3;
  --jenny: #E8598B;
  --chris-bg: #E0F5F4;
  --jenny-bg: #FDE4ED;
  --school-on: #34C759;
  --school-off: #D1D1D6;
  --gray100: #F5F5F7;
  --gray200: #E5E5EA;
  --gray300: #D1D1D6;
  --gray500: #8E8E93;
  --gray700: #48484A;
  --gray900: #1C1C1E;
  --today-ring: #FF9500;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: #FAFAFA; color: var(--gray900);
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
  /* Safe area for notch / dynamic island */
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  padding-bottom: env(safe-area-inset-bottom);
}
.header {
  position: sticky; top: 0; z-index: 100;
  width: 100%;
  background: rgba(250,250,250,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--gray200);
  padding: calc(10px + env(safe-area-inset-top)) 16px 8px;
  display: flex; align-items: center; justify-content: center;
  gap: 16px; flex-wrap: wrap;
}
.header h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.header-controls { display: flex; align-items: center; gap: 4px; }
.today-btn { font-size: 15px; color: var(--chris); background: none; border: none; cursor: pointer; font-weight: 600; padding: 6px 12px; border-radius: 8px; }
.today-btn:active { background: var(--gray100); }
.zoom-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--gray200); background: #fff; font-size: 16px; font-weight: 600; color: var(--gray700); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.zoom-btn:active { background: var(--gray100); }
.zoom-level { font-size: 11px; color: var(--gray500); min-width: 32px; text-align: center; }
.legend { display: flex; gap: 8px; font-size: 11px; color: var(--gray500); flex-wrap: nowrap; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 3px; white-space: nowrap; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dow-row {
  display: grid; grid-template-columns: repeat(126, 1fr);
  text-align: center; font-size: 11px; font-weight: 600; color: var(--gray500);
  padding: 8px 0 6px;
  background: rgba(250,250,250,0.95);
  position: sticky; z-index: 99;
  backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--gray200);
}
#zoomWrap { transition: zoom 0.2s ease; }
.calendar-body { padding: 0 0 100px; }
.month-label {
  font-size: 22px; font-weight: 700;
  padding: 20px 16px 10px;
  position: sticky;
  background: rgba(250,250,250,0.97);
  backdrop-filter: blur(10px);
  z-index: 50;
}

/* ── WEEK ROW: 5 explicit grid rows ── */
.week-row {
  display: grid;
  grid-template-columns: repeat(126, 1fr);
  grid-template-rows: auto 22px 2px 22px; /* row 1: date+dots, row 2: Luther, row 3: gap, row 4: Elliot — additional rows auto-expand for overlay bars */
  gap: 0;
  padding-bottom: 4px;
  border-bottom: 0.5px solid var(--gray100);
  position: relative;
}
.day-div {
  grid-row: 1 / -1;
  width: 0;
  border-left: 0.5px solid var(--gray200);
  pointer-events: none;
  z-index: 1;
}

/* Day cells occupy row 1 only */
.day-cell {
  grid-row: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 0 4px;
}
.day-num {
  font-size: 16px; font-weight: 400;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 3px;
}
.day-cell.today .day-num { background: var(--today-ring); color: #fff; font-weight: 700; }
.day-cell.other-month { opacity: 0.2; }
.school-dots { display: flex; gap: 3px; }
.school-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--school-off); display: flex; align-items: center; justify-content: center; }
.school-dot.in-session { background: var(--school-on); box-shadow: 0 0 3px rgba(52,199,89,0.5); }
.school-dot-label { font-size: 5.5px; font-weight: 800; color: rgba(255,255,255,0.9); line-height: 1; }
.school-dot:not(.in-session) .school-dot-label { color: rgba(0,0,0,0.3); }

/* ── CUSTODY BARS: continuous multi-day spans ── */
.cbar {
  height: 20px;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.3px;
  z-index: 2;
}
.cbar.luther { grid-row: 2; }
.cbar.elliot { grid-row: 4; }
.cbar.chris { background: var(--chris); }
.cbar.jenny { background: var(--jenny); }
.cbar.swap-jenny { background: #C2185B; }
.cbar.swap-chris { background: #1A8A88; }

/* Rounding only on true start/end caps */
.cbar.cap-left { border-top-left-radius: 6px; border-bottom-left-radius: 6px; margin-left: 3px; }
.cbar.cap-right { border-top-right-radius: 6px; border-bottom-right-radius: 6px; margin-right: 3px; }

/* Name label centered */
.cbar .bar-name {
  position: absolute;
  width: 100%;
  text-align: center;
  pointer-events: none;
  font-size: 10px;
  font-weight: 700;
}

/* Exchange time labels — positioned near the handoff edge on the longer bar */
.cbar .bar-xtime {
  position: absolute;
  font-size: 8px;
  font-weight: 700;
  opacity: 0.9;
  white-space: nowrap;
  color: rgba(255,255,255,0.95);
  pointer-events: none;
  text-shadow: 0 0.5px 1px rgba(0,0,0,0.15);
}
.cbar .bar-xtime-start { left: 6px; }
.cbar .bar-xtime-end { right: 6px; }

/* ── HOLIDAY BAR: dynamic rows (styled like event bars with hover tooltip) ── */
.hbar {
  height: 14px;
  border-radius: 6px;
  z-index: 2;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  cursor: pointer;
}
.hbar.chris { background: var(--chris); }
.hbar.jenny { background: var(--jenny); }
.hbar.cap-left { border-top-left-radius: 6px; border-bottom-left-radius: 6px; margin-left: 3px; }
.hbar.cap-right { border-top-right-radius: 6px; border-bottom-right-radius: 6px; margin-right: 3px; }
.hbar-label { font-size: 7px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-shadow: 0 0.5px 1px rgba(0,0,0,0.3); }
/* Holiday glassmorphism hover tooltip */
.hbar .hbar-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.45);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  padding: 12px 16px;
  min-width: 210px;
  max-width: 300px;
  z-index: 200;
  pointer-events: none;
  white-space: normal;
}
.hbar:hover .hbar-tooltip { display: block; }
.hbar-tooltip .ht-name { font-size: 13px; font-weight: 700; color: var(--gray900); line-height: 1.3; }
.hbar-tooltip .ht-range { font-size: 11px; color: var(--gray700); margin-top: 4px; }
.hbar-tooltip .ht-parent { font-size: 11px; font-weight: 600; margin-top: 6px; padding: 2px 10px; border-radius: 10px; display: inline-block; }
.hbar-tooltip .ht-parent.chris { background: rgba(42,181,179,0.15); color: var(--chris); }
.hbar-tooltip .ht-parent.jenny { background: rgba(232,89,139,0.15); color: var(--jenny); }

/* ── EVENT BAR: dynamic rows (overlay) ── */
.ebar {
  height: 14px;
  border-radius: 6px;
  z-index: 2;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ebar.pending { background: #FF9500; opacity: 0.8; }
.ebar.chris { background: var(--chris); opacity: 0.8; }
.ebar.jenny { background: var(--jenny); opacity: 0.8; }
.ebar.swap { background: #C2185B; opacity: 0.85; }
.ebar.cap-left { border-top-left-radius: 6px; border-bottom-left-radius: 6px; margin-left: 3px; }
.ebar.cap-right { border-top-right-radius: 6px; border-bottom-right-radius: 6px; margin-right: 3px; }
.ebar-label { font-size: 7px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; }

/* HOLIDAY DETAIL CARDS — removed (now in hover tooltips) */

/* EVENT DETAIL CARDS */
.event-detail {
  display: flex; align-items: flex-start;
  padding: 10px 16px; gap: 10px;
  border-bottom: 0.5px solid var(--gray200); background: #FFFBF0;
}
.ed-color { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 44px; }
.ed-color.pending { background: #FF9500; }
.ed-color.chris { background: var(--chris); }
.ed-color.jenny { background: var(--jenny); }
.ed-color.swap { background: #C2185B; }
.ed-body { flex: 1; }
.ed-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
.ed-range { font-size: 13px; color: var(--gray500); margin-top: 2px; }
.ed-status { font-size: 11px; font-weight: 600; margin-top: 4px; padding: 2px 10px; border-radius: 10px; display: inline-block; }
.ed-status.pending { background: #FFF3E0; color: #FF9500; }
.ed-status.chris { background: var(--chris-bg); color: var(--chris); }
.ed-status.jenny { background: var(--jenny-bg); color: var(--jenny); }
.ed-status.swap { background: #FCE4EC; color: #C2185B; }

/* ── Hide mobile tap tooltips globally (shown via JS on mobile only) ── */
.cbar-tooltip { display: none; }

@media (min-width: 768px) {
  .calendar-body { max-width: 900px; margin: 0 auto; }
  .dow-row { max-width: 900px; margin: 0 auto; }
}

/* ── MOBILE: NATIVE iOS FEEL ── */
@media (max-width: 767px) {

  /* ── Header: compact, native toolbar style ── */
  .header {
    flex-direction: column;
    gap: 6px;
    padding: 6px 16px 8px;
  }
  .header h1 { font-size: 17px; font-weight: 700; }

  /* Legend: hidden on mobile */
  .legend { display: none; }

  /* Zoom: hidden on mobile */
  .zoom-btn { display: none; }
  .zoom-level { display: none; }

  /* Today button + controls: clean spacing */
  .header-controls { gap: 12px; }
  .today-btn {
    font-size: 15px; font-weight: 700;
    padding: 10px 20px;
    border-radius: 10px;
    background: var(--chris);
    color: #fff;
  }
  .today-btn:active { background: #1A8A88; }

  /* Day-of-week header */
  .dow-row { font-size: 12px; font-weight: 700; padding: 8px 0 6px; color: var(--gray500); }

  /* Month labels: bold, native section header */
  .month-label { font-size: 22px; font-weight: 800; padding: 20px 16px 10px; }

  /* ── Week row: taller bars, more breathing room ── */
  .week-row {
    grid-template-rows: auto 28px 3px 28px; /* taller custody bars + gap */
    padding-bottom: 6px;
  }

  /* Day cells: clean, tappable */
  .day-cell { padding: 6px 0 4px; }
  .day-num {
    font-size: 15px; font-weight: 500;
    width: 32px; height: 32px;
  }
  .day-cell.today .day-num { font-weight: 800; }

  /* School dots: slightly larger */
  .school-dots { gap: 2px; margin-top: 1px; }
  .school-dot { width: 8px; height: 8px; }
  .school-dot-label { font-size: 5px; }

  /* ── Custody bars: taller, clean text ── */
  .cbar {
    height: 26px;
    border-radius: 8px;
    font-size: 11px;
  }
  .cbar.cap-left { border-top-left-radius: 8px; border-bottom-left-radius: 8px; margin-left: 2px; }
  .cbar.cap-right { border-top-right-radius: 8px; border-bottom-right-radius: 8px; margin-right: 2px; }

  /* Name: always centered, truncate if needed */
  .cbar .bar-name {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  /* Exchange time labels: visible on mobile too, slightly larger */
  .cbar .bar-xtime {
    font-size: 9px;
    font-weight: 800;
    opacity: 0.95;
  }
  .cbar .bar-xtime-start { left: 4px; }
  .cbar .bar-xtime-end { right: 4px; }

  /* ── Holiday bars: tappable, readable ── */
  .hbar {
    height: 20px;
    min-height: 20px;
    border-radius: 8px;
    margin-top: 1px;
  }
  .hbar.cap-left { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
  .hbar.cap-right { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
  .hbar-label {
    font-size: 9px;
    font-weight: 700;
    padding: 0 6px;
    text-shadow: 0 0.5px 2px rgba(0,0,0,0.3);
  }

  /* ── Event bars: same treatment ── */
  .ebar {
    height: 20px;
    min-height: 20px;
    border-radius: 8px;
    margin-top: 1px;
  }
  .ebar.cap-left { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
  .ebar.cap-right { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
  .ebar-label {
    font-size: 9px;
    font-weight: 700;
    padding: 0 6px;
  }

  /* ── Holiday tooltip: larger, native card feel ── */
  .hbar .hbar-tooltip {
    left: 8px;
    right: 8px;
    transform: none;
    min-width: unset;
    width: calc(100vw - 48px);
    max-width: 340px;
    padding: 14px 16px;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.08);
  }
  .hbar-tooltip .ht-name { font-size: 16px; font-weight: 700; }
  .hbar-tooltip .ht-range { font-size: 13px; margin-top: 4px; }
  .hbar-tooltip .ht-parent { font-size: 13px; padding: 4px 14px; margin-top: 8px; }

  /* ── Event detail cards: native list cell style ── */
  .event-detail {
    padding: 12px 16px;
    gap: 12px;
    border-radius: 0;
  }
  .ed-color { width: 5px; border-radius: 3px; min-height: 48px; }
  .ed-name { font-size: 16px; font-weight: 600; }
  .ed-range { font-size: 13px; }
  .ed-status { font-size: 12px; padding: 4px 12px; }

  /* ── Custody bar tap tooltip (mobile-only) ── */
  .cbar-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.14);
    padding: 10px 14px;
    min-width: 160px;
    max-width: 260px;
    z-index: 200;
    pointer-events: none;
    white-space: normal;
    font-size: 13px;
    color: var(--gray900);
    font-weight: 600;
    text-align: center;
  }
  .cbar.tooltip-active .cbar-tooltip { display: block; }
}

/* ── TOUCH / TAP TOOLTIP SUPPORT ── */
.hbar.tooltip-active .hbar-tooltip { display: block; }

/* Dismiss overlay: invisible full-screen layer behind active tooltip */
.tooltip-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 199;
}
.tooltip-backdrop.active { display: block; }
</style>
</head>

<div class="tooltip-backdrop" id="tooltipBackdrop"></div>
<div class="header">
  <h1>Custody Calendar</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--chris)"></div>Chris</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--jenny)"></div>Jenny</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--school-on)"></div>In School</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--school-off)"></div>No School</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF9500"></div>Pending</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--chris)"></div>Chris Event</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--jenny)"></div>Jenny Event</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C2185B"></div>Accepted Swap</div>
  </div>
  <div class="header-controls">
    <button class="zoom-btn" onclick="zoomOut()" aria-label="Zoom out">&minus;</button>
    <span class="zoom-level" id="zoomLabel">100%</span>
    <button class="zoom-btn" onclick="zoomIn()" aria-label="Zoom in">+</button>
    <button class="today-btn" onclick="scrollToToday()">Today</button>
  </div>
</div>

<div class="dow-row">
  <div style="grid-column:1/19;text-align:center">S</div>
  <div style="grid-column:19/37;text-align:center">M</div>
  <div style="grid-column:37/55;text-align:center">T</div>
  <div style="grid-column:55/73;text-align:center">W</div>
  <div style="grid-column:73/91;text-align:center">T</div>
  <div style="grid-column:91/109;text-align:center">F</div>
  <div style="grid-column:109/127;text-align:center">S</div>
</div>

<div id="zoomWrap">
  <div class="calendar-body" id="calBody"></div>
</div>

// ── Approximate school calendar generator for years beyond known data ──
// Patterns derived from Bentonville/Rogers AR school districts 2025-2027.
// These are estimates — replace with real dates when district publishes them.
(function generateApproxSchoolEvents() {
  // Find the last school year we have real data for
  const knownYears = {};
  for (const e of SCHOOL_EVENTS) {
    if (e.t === 'FIRST_DAY') {
      const yr = parseInt(e.s.substring(0, 4));
      const sy = e.s.substring(5,7) >= '07' ? yr + '-' + (yr+1) : (yr-1) + '-' + yr;
      knownYears[sy] = true;
    }
  }

  function pad(n) { return String(n).padStart(2, '0'); }
  function fmt(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
  function nthWkday(yr, mo, wd, n) {
    if (n > 0) { const f = new Date(yr,mo,1); return new Date(yr,mo,1+(wd-f.getDay()+7)%7+7*(n-1)); }
    else { const l = new Date(yr,mo+1,0); return new Date(yr,mo+1,-(l.getDay()-wd+7)%7); }
  }
  function addD(d,n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

  // Generate approximate events for school years 2027-2028 through 2035-2036
  for (let startYr = 2027; startYr <= 2035; startYr++) {
    const sy = startYr + '-' + (startYr + 1);
    if (knownYears[sy]) continue;

    const endYr = startYr + 1;
    for (const ch of ['L', 'E']) {
      // First Day of School: 2nd Monday of August
      const firstDay = nthWkday(startYr, 7, 1, 2);
      SCHOOL_EVENTS.push({c:ch, t:'FIRST_DAY', n:'First Day of School (approx)', s:fmt(firstDay)});

      // Labor Day: 1st Monday of September
      const laborDay = nthWkday(startYr, 8, 1, 1);
      SCHOOL_EVENTS.push({c:ch, t:'HOLIDAY', n:'Labor Day', s:fmt(laborDay), ns:1});

      // Fall Break: 3rd week of October, Thu-Mon (~Oct 16-20 pattern)
      const fallPTC = nthWkday(startYr, 9, 3, 3); // 3rd Wednesday of Oct
      const fallStart = addD(fallPTC, 1); // Thursday
      const fallEnd = addD(fallStart, 4); // Monday
      SCHOOL_EVENTS.push({c:ch, t:'PTC', n:'Parent Teacher Conference (Fall, approx)', s:fmt(fallPTC)});
      SCHOOL_EVENTS.push({c:ch, t:'BREAK', n:'Fall Break / Staff Development (approx)', s:fmt(fallStart), e:fmt(fallEnd), ns:1});

      // Thanksgiving Break: Mon-Fri of Thanksgiving week
      const thanksgiving = nthWkday(startYr, 10, 4, 4); // 4th Thursday of November
      const thanksStart = addD(thanksgiving, -3); // Monday
      const thanksEnd = addD(thanksgiving, 1); // Friday
      SCHOOL_EVENTS.push({c:ch, t:'BREAK', n:'Thanksgiving Break (approx)', s:fmt(thanksStart), e:fmt(thanksEnd), ns:1});

      // Winter Break: ~Dec 19 to Jan 4 (Fri before Christmas to first Mon of Jan)
      let winterStart = new Date(startYr, 11, 19);
      // Back up to Friday if Dec 19 isn't a Friday
      while (winterStart.getDay() !== 5) winterStart = addD(winterStart, -1);
      let winterEnd = new Date(endYr, 0, 4);
      // Push to Sunday/Monday
      while (winterEnd.getDay() !== 0 && winterEnd.getDay() !== 1) winterEnd = addD(winterEnd, 1);
      SCHOOL_EVENTS.push({c:ch, t:'BREAK', n:'Winter Break (approx)', s:fmt(winterStart), e:fmt(winterEnd), ns:1});

      // MLK Day: 3rd Monday of January
      const mlk = nthWkday(endYr, 0, 1, 3);
      SCHOOL_EVENTS.push({c:ch, t:'HOLIDAY', n:'Martin Luther King Jr Day', s:fmt(mlk), ns:1});

      // Presidents Day: 3rd Monday of February
      const presDay = nthWkday(endYr, 1, 1, 3);
      SCHOOL_EVENTS.push({c:ch, t:'HOLIDAY', n:'Presidents Day', s:fmt(presDay), ns:1});

      // Staff Development: day after PTC in February (~2nd Thu/Fri of Feb)
      const springPTC = nthWkday(endYr, 1, 4, 2); // 2nd Thursday of Feb
      SCHOOL_EVENTS.push({c:ch, t:'PTC', n:'Parent Teacher Conference (Spring, approx)', s:fmt(springPTC)});
      SCHOOL_EVENTS.push({c:ch, t:'TEACHER_WORKDAY', n:'Staff Development (approx)', s:fmt(addD(springPTC, 1)), ns:1});

      // Spring Break: 4th week of March, Mon-Fri
      const springMon = nthWkday(endYr, 2, 1, 4); // 4th Monday of March
      const springFri = addD(springMon, 4);
      SCHOOL_EVENTS.push({c:ch, t:'BREAK', n:'Spring Break (approx)', s:fmt(springMon), e:fmt(springFri), ns:1});

      // Staff Development April: 3rd Friday of April
      const aprilSD = nthWkday(endYr, 3, 5, 3);
      SCHOOL_EVENTS.push({c:ch, t:'TEACHER_WORKDAY', n:'Staff Development (April, approx)', s:fmt(aprilSD), ns:1});

      // Last Day of School: 3rd Thursday of May
      const lastDay = nthWkday(endYr, 4, 4, 3);
      SCHOOL_EVENTS.push({c:ch, t:'LAST_DAY', n:'Last Day of School (approx)', s:fmt(lastDay)});

      // Memorial Day
      const memorial = nthWkday(endYr, 4, 1, -1);
      SCHOOL_EVENTS.push({c:ch, t:'HOLIDAY', n:'Memorial Day', s:fmt(memorial), ns:1});

      // Independence Day
      SCHOOL_EVENTS.push({c:ch, t:'HOLIDAY', n:'Independence Day', s:endYr+'-07-04', ns:1});
    }
  }
})();

// CUSTODY FORMULA ENGINE
// Port of custody.py — computes custody for any date
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const DECREE_START = new Date(2025, 4, 9); // May 9, 2025
const DECREE_START_PARENT = 'J';

function dk(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseD(s) { const p = s.split('-'); return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2])); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

function nthWeekday(year, month, weekday, n) {
  if (n > 0) {
    const first = new Date(year, month, 1);
    const offset = (weekday - first.getDay() + 7) % 7;
    return new Date(year, month, 1 + offset + 7 * (n - 1));
  } else {
    const last = new Date(year, month + 1, 0);
    const offset = (last.getDay() - weekday + 7) % 7;
    return new Date(year, month + 1, -offset);
  }
}

function fridayBefore(d) {
  const off = (d.getDay() - 5 + 7) % 7;
  return addDays(d, -off);
}

function sundayAfter(d) {
  const off = (7 - d.getDay()) % 7;
  return addDays(d, off);
}

function easter(year) {
  const a = year % 19;
  const b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function alternates(baseYear, baseParent, queryYear) {
  return (queryYear - baseYear) % 2 === 0 ? baseParent : (baseParent === 'J' ? 'C' : 'J');
}

// School calendar lookup
function getBreak(child, breakName, year) {
  const bn = breakName.toLowerCase();
  for (const e of SCHOOL_EVENTS) {
    if (e.c !== child) continue;
    if (e.t !== 'BREAK') continue;
    if (!e.n.toLowerCase().includes(bn)) continue;
    const sd = parseD(e.s);
    if (sd.getFullYear() === year || (bn === 'winter' && sd.getFullYear() === year)) {
      return { start: sd, end: e.e ? parseD(e.e) : sd };
    }
  }
  return null;
}

function schoolReleaseBefore(child, breakName, year) {
  const brk = getBreak(child, breakName, year);
  if (!brk) return null;
  let d = addDays(brk.start, -1);
  while (d.getDay() === 0 || d.getDay() === 6) d = addDays(d, -1);
  return d;
}

function isSchoolDay(child, d) {
  if (d.getDay() === 0 || d.getDay() === 6) return false;
  const ds = dk(d);
  for (const e of SCHOOL_EVENTS) {
    if (e.c !== child) continue;
    if (!e.ns) continue;
    const es = e.s;
    const ee = e.e || e.s;
    if (ds >= es && ds <= ee) return false;
  }
  // Check if within school year
  let firstDay = null, lastDay = null;
  for (const e of SCHOOL_EVENTS) {
    if (e.c !== child) continue;
    if (e.t === 'FIRST_DAY') {
      const fd = parseD(e.s);
      if (fd <= d && (!firstDay || fd > firstDay)) firstDay = fd;
    }
    if (e.t === 'LAST_DAY') {
      const ld = parseD(e.s);
      if (ld >= d && (!lastDay || ld < lastDay)) lastDay = ld;
    }
  }
  if (!firstDay || !lastDay) return false;
  return d >= firstDay && d <= lastDay;
}

// Compute all holiday windows for a child in a year
function computeHolidays(child, year) {
  const holidays = [];

  // LABOR DAY
  const laborDay = nthWeekday(year, 8, 1, 1);
  const laborParent = alternates(2025, 'J', year);
  const laborStart = fridayBefore(laborDay);
  holidays.push({ h: 'LABOR_DAY', p: laborParent, s: laborStart, e: laborDay, note: 'Labor Day Holiday' });

  // HALLOWEEN
  const halloween = new Date(year, 9, 31);
  holidays.push({ h: 'HALLOWEEN', p: alternates(2025, 'J', year), s: halloween, e: halloween, note: 'Halloween' });

  // THANKSGIVING
  const thanksgiving = nthWeekday(year, 10, 4, 4);
  const thanksParent = alternates(2025, 'C', year);
  const thanksBreak = getBreak(child, 'Thanksgiving', year);
  let tStart, tEnd;
  if (thanksBreak) {
    tStart = schoolReleaseBefore(child, 'Thanksgiving', year) || fridayBefore(thanksBreak.start);
    tEnd = sundayAfter(thanksBreak.end);
  } else {
    tStart = addDays(thanksgiving, -5);

  const july4 = new Date(year, 6, 4);
  const july5 = new Date(year, 6, 5);
  holidays.push({ h: 'JULY_4', p: alternates(2026, 'J', year), s: july4, e: july5, note: 'Independence Day' });

// Holiday cache
const _hcache = {};
function getHolidays(child, year) {
  const key = child + year;

  return _hcache[key];
}

// Base week
function baseWeekParent(d) {
  const days = daysBetween(DECREE_START, d);
  if (days < 0) return 'C';
  const week = Math.floor(days / 7);
  return week % 2 === 0 ? DECREE_START_PARENT : (DECREE_START_PARENT === 'J' ? 'C' : 'J');

// Main custody lookup
function getCustody(dateStr, child) {
  const d = parseD(dateStr);

  // 1. Swap override
  const swapKey = dateStr + '|' + child;
  if (SWAP_DAYS[swapKey]) {
    return { p: SWAP_DAYS[swapKey].p, r: 'SWAP', h: null, note: SWAP_DAYS[swapKey].notes || 'Swap day', orig: SWAP_DAYS[swapKey].orig };
  }

  // 2. Holiday override
  const yr = d.getFullYear();
  for (const y of [yr, yr - 1]) {
    for (const hol of getHolidays(child, y)) {
      if (d >= hol.s && d <= hol.e) {
        return { p: hol.p, r: 'HOLIDAY_OVERRIDE', h: hol.h, note: hol.note };
      }
    }
  }

  // 3. Base week
  const p = baseWeekParent(d);
  return { p: p, r: 'BASE_WEEK', h: null, note: (p === 'C' ? "Chris" : "Jenny") + "'s week" };

// Exchange time
function getExchange(dateStr, child) {
  const d = parseD(dateStr);
  const custody = getCustody(dateStr, child);
  const prevDs = dk(addDays(d, -1));
  const prevCustody = getCustody(prevDs, child);

  if (custody.p !== prevCustody.p) {
    // JULY_4 has a fixed 7:30 AM exchange — entering or exiting
    if (custody.h === 'JULY_4' || prevCustody.h === 'JULY_4') return '7:30 AM';
    // Swap boundary
    if (custody.r === 'SWAP' || prevCustody.r === 'SWAP') {
      return isSchoolDay(child, d) ? 'at school' : '5:00 PM';
    }
    if (custody.r === 'HOLIDAY_OVERRIDE') {
      if (custody.h && custody.h.includes('CHRISTMAS_2')) return '10:00 AM';
      if (custody.h === 'SPRING_BREAK') return 'at school';
      return isSchoolDay(child, d) ? 'at school' : '5:00 PM';
    }
    if (custody.r === 'BASE_WEEK') {
      return isSchoolDay(child, d) ? 'at school' : '5:00 PM';

      const key = hol.h + '|' + dk(hol.s) + '|' + hol.p;
      if (seen[key]) continue;
      seen[key] = true;
      const sD = parseD(dk(hol.s));
      const eD = parseD(dk(hol.e));
      const fmt = d => d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
      const exStart = getExchange(dk(hol.s), 'L') || getExchange(dk(hol.s), 'E');
      const exEnd = getExchange(dk(addDays(hol.e, 1)), 'L') || getExchange(dk(addDays(hol.e, 1)), 'E');
      let startStr = fmt(sD);
      if (exStart) startStr += (exStart.startsWith('at ') ? ' ' : ' at ') + exStart;
      let endStr = fmt(eD);
      if (exEnd) endStr += (exEnd.startsWith('at ') ? ' ' : ' at ') + exEnd;
      holidays.push({
        name: hol.note,
        parent: hol.p,
        startDate: dk(hol.s),

        endStr: endStr

function timeToSlice(timeStr) {
  if (!timeStr) return 0;

      for (const bar of overlayBars) {
        let placed = false;
        for (let r = 0; r < packedRows.length; r++) {
          // Check if bar overlaps any bar already in this row
          const conflicts = packedRows[r].some(function(existing) {
            return bar.colStart < existing.colEnd && bar.colEnd > existing.colStart;
          });
          if (!conflicts) {
            packedRows[r].push(bar);
            placed = true;
            break;
          }
        }
        if (!placed) {
          packedRows.push([bar]);
        }
      }
      // Render packed rows starting from row 5
      for (let r = 0; r < packedRows.length; r++) {
        const gridRow = 5 + r;
        for (const bar of packedRows[r]) {
          html += bar.htmlFn(gridRow);
        }
      }

      html += '</div>'; // end week-row

      ws.setDate(ws.getDate() + 7);
      if (ws.getMonth() !== cM && ws.getDay() === 0) break;
      if (ws > lastDay && ws.getDay() === 0) break;
    }

    // Holiday detail cards removed — now shown as hover tooltips on holiday bars

    // Event detail cards for this month
    const ms = cY + '-' + String(cM + 1).padStart(2, '0') + '-01';
    const me = cY + '-' + String(cM + 1).padStart(2, '0') + '-' + lastDay.getDate();
    for (const ev of EVENTS.filter(ev => ev.startDate >= ms && ev.startDate <= me)) {
      const statusLabels = {pending: 'Pending', chris: "Chris's Event", jenny: "Jenny's Event", swap: "Accepted Swap"};
      const startD = new Date(ev.startDate + 'T12:00:00');
      const endD = new Date(ev.endDate + 'T12:00:00');
      const fmt = d => d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
      html += '<div class="event-detail"><div class="ed-color ' + ev.status + '"></div><div class="ed-body">';
      html += '<div class="ed-name">' + ev.name + '</div>';
      html += '<div class="ed-range">' + fmt(startD) + ' \u2013 ' + fmt(endD);
      if (ev.time) html += ' &middot; ' + ev.time;
      html += '</div>';
      if (ev.children) html += '<div style="font-size:12px;color:#666;margin-top:2px">Children: ' + ev.children + '</div>';
      html += '<div class="ed-status ' + ev.status + '">' + (statusLabels[ev.status] || ev.status) + '</div>';
      if (ev.note) html += '<div style="font-size:12px;color:#888;margin-top:4px;font-style:italic">' + ev.note + '</div>';
      html += '</div></div>';
    }

    html += '</div>'; // end month-section

    // Preload holiday cache for this year
    getHolidayListForYear(cY);

    return html;
}

function renderMonth(cY, cM) {
  const key = cY + '-' + String(cM).padStart(2, '0');
  if (_renderedMonths[key]) return;
  _renderedMonths[key] = true;
  const html = buildMonthHtml(cY, cM);
  const body = document.getElementById('calBody');
  // Insert in correct chronological position
  const children = Array.from(body.children);
  let inserted = false;
  for (let i = 0; i < children.length; i++) {
    const cid = children[i].id; // "mYYYY-MM"
    if (cid && cid > 'm' + key) {
      children[i].insertAdjacentHTML('beforebegin', html);
      inserted = true;
      break;
    }
  }
  if (!inserted) body.insertAdjacentHTML('beforeend', html);
  // Attach tap handlers to newly rendered bars
  const section = document.getElementById('m' + key);
  if (section) {
    section.querySelectorAll('.hbar').forEach(function(bar) { attachTapHandler(bar, '.hbar-tooltip'); });
    section.querySelectorAll('.cbar').forEach(function(bar) {
      if (bar.querySelector('.cbar-tooltip')) attachTapHandler(bar, '.cbar-tooltip');
    });
  }
}

function renderMonthRange(startY, startM, endY, endM) {
  let y = startY, m = startM;
  while (y < endY || (y === endY && m <= endM)) {
    if (y > CAL_END.getFullYear() || (y === CAL_END.getFullYear() && m > CAL_END.getMonth())) break;
    if (y > CAL_START.getFullYear() || (y === CAL_START.getFullYear() && m >= CAL_START.getMonth())) {
      renderMonth(y, m);
    }
    m++;
    if (m > 11) { m = 0; y++; }
  }
}

function buildCalendar() {
  // Render a window around today: ±LAZY_BATCH months
  const now = new Date();
  let startM = now.getMonth() - LAZY_BATCH;
  let startY = now.getFullYear();
  while (startM < 0) { startM += 12; startY--; }
  let endM = now.getMonth() + LAZY_BATCH;
  let endY = now.getFullYear();
  while (endM > 11) { endM -= 12; endY++; }
  renderMonthRange(startY, startM, endY, endM);

  // IntersectionObserver: load more months when user scrolls near edges
  setupLazyScroll();
}

function setupLazyScroll() {
  let loading = false;
  const body = document.getElementById('calBody');
  const observer = new IntersectionObserver(function(entries) {
    if (loading) return;
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      loading = true;
      const id = entry.target.id; // "mYYYY-MM"
      const parts = id.substring(1).split('-');
      const y = parseInt(parts[0]), m = parseInt(parts[1]);
      // Is this the first or last rendered month? Load more in that direction
      const keys = Object.keys(_renderedMonths).sort();
      const key = y + '-' + String(m).padStart(2, '0');
      if (key <= keys[1]) {
        // Near top — load earlier months
        let eY = y, eM = m - 1;
        if (eM < 0) { eM = 11; eY--; }
        let sY = eY, sM = eM - LAZY_BATCH + 1;
        while (sM < 0) { sM += 12; sY--; }
        renderMonthRange(sY, sM, eY, eM);
      }
      if (key >= keys[keys.length - 2]) {
        // Near bottom — load later months
        let sY = y, sM = m + 1;
        if (sM > 11) { sM = 0; sY++; }
        let eY = sY, eM = sM + LAZY_BATCH - 1;
        while (eM > 11) { eM -= 12; eY++; }
        renderMonthRange(sY, sM, eY, eM);
      }
      fixStickyOffsets();
      // Re-observe new edge months
      observeEdges();
      loading = false;
      break;
    }
  }, { rootMargin: '400px' });

  function observeEdges() {
    observer.disconnect();
    const sections = body.querySelectorAll('.month-section');
    if (sections.length >= 2) {
      observer.observe(sections[0]);
      observer.observe(sections[1]);
      observer.observe(sections[sections.length - 1]);
      observer.observe(sections[sections.length - 2]);
    }
  }
  observeEdges();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NAVIGATION & ZOOM
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function scrollToToday() {
  const el = document.getElementById('d' + TODAY);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
  const now = new Date();
  const m = document.getElementById('m' + now.getFullYear() + '-' + String(now.getMonth()).padStart(2, '0'));
  if (m) m.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

let currentZoom = 100;
const ZOOM_STEPS = [75, 85, 100, 115, 130, 150, 175, 200];
function applyZoom() {
  const wrap = document.getElementById('zoomWrap');
  const dow = document.querySelector('.dow-row');
  const pct = currentZoom / 100;
  wrap.style.zoom = pct;
  dow.style.zoom = pct;
  document.getElementById('zoomLabel').textContent = currentZoom + '%';
  fixStickyOffsets();
}
function zoomIn() {
  const idx = ZOOM_STEPS.indexOf(currentZoom);
  if (idx < ZOOM_STEPS.length - 1) currentZoom = ZOOM_STEPS[idx + 1];
  else if (idx === -1) currentZoom = ZOOM_STEPS.find(s => s > currentZoom) || ZOOM_STEPS[ZOOM_STEPS.length - 1];
  applyZoom();
}
function zoomOut() {
  const idx = ZOOM_STEPS.indexOf(currentZoom);
  if (idx > 0) currentZoom = ZOOM_STEPS[idx - 1];
  else if (idx === -1) currentZoom = [...ZOOM_STEPS].reverse().find(s => s < currentZoom) || ZOOM_STEPS[0];
  applyZoom();
}
function fixStickyOffsets() {
  const header = document.querySelector('.header');
  const dow = document.querySelector('.dow-row');
  if (header && dow) {
    const zf = currentZoom / 100;
    const hH = header.offsetHeight;
    dow.style.top = (hH / zf) + 'px';
    const dowH = dow.getBoundingClientRect().height;
    const mTop = (hH + dowH) / zf;
    document.querySelectorAll('.month-label').forEach(el => { el.style.top = mTop + 'px'; });
  }
}

buildCalendar();
fixStickyOffsets();
window.addEventListener('resize', fixStickyOffsets);
setTimeout(scrollToToday, 100);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOUCH / TAP TOOLTIP SUPPORT (global — used by lazy loader)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _activeBar = null;
var _backdrop = document.getElementById('tooltipBackdrop');

function dismissTooltip() {
  if (_activeBar) {
    _activeBar.classList.remove('tooltip-active');
    _activeBar = null;
  }
  _backdrop.classList.remove('active');
}

function attachTapHandler(bar, tipSelector) {
  bar.addEventListener('click', function(e) {
    e.stopPropagation();
    if (_activeBar === bar) { dismissTooltip(); return; }
    dismissTooltip();
    bar.classList.add('tooltip-active');
    _activeBar = bar;
    _backdrop.classList.add('active');

    var tip = bar.querySelector(tipSelector);
    if (tip) {
      tip.style.left = '';
      tip.style.right = '';
      tip.style.transform = '';
      tip.style.bottom = '';
      tip.style.top = '';
      requestAnimationFrame(function() {
        var r = tip.getBoundingClientRect();
        if (r.left < 8) { tip.style.left = '0'; tip.style.transform = 'none'; }
        else if (r.right > window.innerWidth - 8) { tip.style.left = 'auto'; tip.style.right = '0'; tip.style.transform = 'none'; }
        if (r.top < 0) { tip.style.bottom = 'auto'; tip.style.top = 'calc(100% + 8px)'; }
      });
    }
  });
}

_backdrop.addEventListener('click', dismissTooltip);
document.addEventListener('click', function(e) {
  if (_activeBar && !_activeBar.contains(e.target)) dismissTooltip();
});

// Mobile auto-zoom
if (window.innerWidth < 500) {
  currentZoom = 100;
  applyZoom();
}

// SERVICE WORKER REGISTRATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    console.log('SW registered:', reg.scope);
  }).catch(function(err) {
    console.log('SW registration failed:', err);
  });
}
